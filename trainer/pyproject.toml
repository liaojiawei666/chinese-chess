[project]
name = "chinese-chess-trainer"
version = "0.1.0"
description = "PyTorch training + orchestration for Chinese chess AlphaZero self-play."
requires-python = ">=3.10"
dependencies = [
    "numpy<2",
    "torch==2.9.1",
    "safetensors",
]

[dependency-groups]
dev = [
    "pytest",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.setuptools.packages.find]
where = ["src"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
