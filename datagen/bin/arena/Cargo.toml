[package]
name = "arena"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "arena"
path = "src/main.rs"

[dependencies]
engine = { path = "../../crates/engine" }
encoder = { path = "../../crates/encoder" }
mcts = { path = "../../crates/mcts" }
inference = { path = "../../crates/inference" }
store = { path = "../../crates/store" }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
rand = { workspace = true }

[features]
# 默认用均匀评估器（无需 libtorch）做管线自检；启用 torch 后加载真实 model.pt 对杀。
default = []
torch = ["inference/torch"]
